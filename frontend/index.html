<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northstar Fitness</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="noise"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <nav class="navbar hidden" id="navbar">
        <div class="nav-brand">Northstar.</div>
        <div class="nav-links">
            <button class="nav-btn active" id="btn-dashboard">Dashboard</button>
            <button class="nav-btn" id="btn-profile">Profile</button>
            <button class="nav-btn" id="btn-tracker">Tracker</button>
            <button class="nav-btn logout-btn" id="btn-logout">Logout</button>
        </div>
    </nav>

    <main id="app-container">
        <!-- Auth View -->
        <section id="auth-view" class="view active-view">
            <div class="glass-card auth-container">
                <h1 class="glow-text">Welcome to Northstar</h1>
                <p class="subtitle">Your AI-powered fitness journey starts here.</p>
                
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchAuthTab('login')">Login</button>
                    <button class="tab-btn" onclick="switchAuthTab('register')">Register</button>
                </div>

                <form id="auth-form" onsubmit="handleAuth(event)">
                    <div class="input-group" id="name-group" style="display: none;">
                        <input type="text" id="auth-name" placeholder="Full Name">
                    </div>
                    <div class="input-group">
                        <input type="email" id="auth-email" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="auth-password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="primary-btn glow-btn">
                        <span id="auth-submit-text">Login</span>
                    </button>
                    <div id="auth-error" class="error-msg"></div>
                </form>
            </div>
        </section>

        <!-- Dashboard View -->
        <section id="dashboard-view" class="view hidden">
            <div class="dashboard-header">
                <h2>Your Workouts</h2>
                <button class="primary-btn pulse-btn" onclick="openWorkoutModal()">Start New Workout</button>
            </div>
            
            <div class="workouts-grid" id="workouts-grid">
                <!-- Dynamically populated via JS -->
                <div class="glass-skeleton"><div class="ske-line w-50"></div><div class="ske-line w-80"></div></div>
            </div>
        </section>

        <!-- Profile View -->
        <section id="profile-view" class="view hidden">
            <div class="profile-layout">
                <div class="glass-card stat-card">
                    <h3>Update Profile</h3>
                    <form id="profile-form" onsubmit="handleProfileUpdate(event)">
                        <div class="input-group"><input type="number" step="0.1" id="prof-weight" placeholder="Weight (kg)"></div>
                        <div class="input-group"><input type="number" step="0.1" id="prof-height" placeholder="Height (cm)"></div>
                        <div class="input-group"><input type="number" id="prof-age" placeholder="Age"></div>
                        <button class="primary-btn glow-btn">Save Profile</button>
                    </form>
                </div>

                <div class="glass-card stat-card ai-card">
                    <div class="ai-header">
                        <h3>AI Recommendation</h3>
                        <button class="primary-btn small-btn" onclick="getAIRecommendation()">Generate</button>
                    </div>
                    <div id="ai-result" class="ai-result">
                        <div class="glow-text">Press generate for today's optimal routine.</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Tracker View -->
        <section id="tracker-view" class="view hidden">
            <div class="glass-card stat-card" style="margin-top: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h3>Progress Tracker</h3>
                    <select id="tracker-exercise-select" class="glow-btn" style="padding: 0.8rem; border-radius: 8px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid var(--glass-border); font-size:1rem;" onchange="updateTrackerGraph()">
                        <option value="">Select an exercise...</option>
                    </select>
                </div>
                <div style="position: relative; height: 350px; width: 100%;">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <!-- Workout Modal -->
    <div id="modal-backdrop" class="modal-backdrop hidden" onclick="closeModal(event)">
        <div class="glass-card modal">
            <h3>Add New Exercise</h3>
            <form id="exercise-form" onsubmit="handleAddExercise(event)">
                <input type="hidden" id="ex-workout-id">
                <div class="input-group">
                    <input type="text" id="ex-name" placeholder="Exercise Name (e.g. Bench Press)" list="exercise-suggestions" required>
                    <datalist id="exercise-suggestions"></datalist>
                </div>
                <div class="split-group">
                    <input type="number" id="ex-sets" placeholder="Sets" required min="1">
                    <input type="number" id="ex-reps" placeholder="Reps" required min="1">
                </div>
                <div class="input-group">
                    <input type="number" id="ex-weight" placeholder="Weight (kg)" required>
                </div>
                <button type="submit" class="primary-btn glow-btn">Save Exercise</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
